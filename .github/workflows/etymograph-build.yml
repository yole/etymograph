name: Publish read-only database
on:
  workflow_call:
    secrets:
      NETLIFY_AUTH_TOKEN:
        required: true
      ETYMOGRAPH_SITE_ID:
        required: true
      GOOGLE_CLIENT_ID:
        required: true
      GOOGLE_CLIENT_SECRET:
        required: true
jobs:
  export-database:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout JRRT
        uses: actions/checkout@v6
        with:
          repository: yole/etymograph-jrrt
          path: data/jrrt

      - name: Checkout IE
        uses: actions/checkout@v6
        with:
          repository: yole/etymograph-ie
          path: data/ie

      - name: Start backend
        run: docker compose up backend --build --detach --wait
        env:
          ETYMOGRAPH_GRAPH_PATH: data/jrrt,data/ie
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}

      - name: Create export target directory
        run: mkdir export

      - name: Generate exported data
        run: docker compose up --build frontend-export --exit-code-from frontend-export

      - name: Publish to Netlify
        uses: South-Paw/action-netlify-cli@v2
        with:
          args: deploy --dir=export/out --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.ETYMOGRAPH_SITE_ID }}

      - name: Show logs
        if: always()
        run: docker logs etymograph-backend-1

      - name: Inspect health check
        if: always()
        run: docker inspect etymograph-backend-1

      - name: Stop containers
        if: always()
        run: docker compose down
